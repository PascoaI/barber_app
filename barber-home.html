<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Barbeiro | BarberPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#c69a45',
              'primary-dark': '#a87a2f',
              background: '#090c14',
              surface: '#111624',
              borderc: '#28314a',
              'text-primary': '#edf2ff',
              'text-secondary': '#9da8c3'
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif']
            },
            borderRadius: {
              xl: '1rem',
              '2xl': '1.25rem'
            },
            boxShadow: {
              soft: '0 10px 30px rgba(0,0,0,0.24)'
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <main class="page booking-page min-h-screen grid place-items-center p-4 md:p-8 bg-background text-text-primary font-sans py-4 md:py-8">
      <section class="booking-card w-full max-w-4xl rounded-2xl border border-borderc bg-surface shadow-soft p-4 md:p-8">
        <p class="text-xs uppercase tracking-[0.22em] text-primary/90 font-semibold">Operacao barber</p>
        <h1 class="mt-2">Agenda do barbeiro</h1>
        <p class="subtitle text-text-secondary leading-relaxed mt-2 mb-5">Visualize seus atendimentos, acompanhe status e conclua serviços direto da home.</p>

        <div class="grid gap-3 md:grid-cols-2 mb-4">
          <article class="rounded-xl border border-emerald-400/35 bg-gradient-to-br from-emerald-500/15 via-emerald-500/5 to-transparent p-4">
            <p class="text-xs uppercase tracking-wide text-emerald-100/85">Ganhos de hoje</p>
            <strong id="barber-earnings-today" class="block text-2xl mt-1">R$ 0,00</strong>
            <small class="text-emerald-100/80">Somente serviços concluidos.</small>
          </article>
          <article class="rounded-xl border border-sky-400/35 bg-gradient-to-br from-sky-500/15 via-sky-500/5 to-transparent p-4">
            <p class="text-xs uppercase tracking-wide text-sky-100/85">Ganhos da semana</p>
            <strong id="barber-earnings-week" class="block text-2xl mt-1">R$ 0,00</strong>
            <small class="text-sky-100/80">Soma semanal dos atendimentos concluidos.</small>
          </article>
        </div>

        <div id="barber-home-agenda" class="grid gap-3"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
