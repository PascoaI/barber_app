<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Agendamentos | BarberPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page booking-page">
      <section class="booking-card">
        <a class="back-link" href="admin-home.html">← Dashboard</a>
        <h1>Agendamentos</h1>
        <p class="subtitle">Agenda com status, filtro por barbeiro e ações operacionais.</p>

        <label for="admin-professional-filter">Filtrar por profissional</label>
        <select id="admin-professional-filter"></select>

        <label for="admin-status-filter">Filtrar por status</label>
        <select id="admin-status-filter">
          <option value="all">Todos</option>
          <option value="pending">pending</option>
          <option value="confirmed">confirmed</option>
          <option value="canceled">canceled</option>
          <option value="completed">completed</option>
          <option value="no_show">no_show</option>
        </select>

        <div id="admin-schedules-list" class="admin-schedules-list"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
