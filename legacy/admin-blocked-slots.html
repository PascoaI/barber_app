<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Bloqueio de horários | BarberPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#c69a45',
              'primary-dark': '#a87a2f',
              background: '#090c14',
              surface: '#111624',
              borderc: '#28314a',
              'text-primary': '#edf2ff',
              'text-secondary': '#9da8c3'
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif']
            },
            borderRadius: {
              xl: '1rem',
              '2xl': '1.25rem'
            },
            boxShadow: {
              soft: '0 10px 30px rgba(0,0,0,0.24)'
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <main class="page booking-page min-h-screen grid place-items-center p-4 md:p-8 bg-background text-text-primary font-sans py-4 md:py-8">
      <section class="booking-card w-full max-w-4xl rounded-2xl border border-borderc bg-surface shadow-soft p-4 md:p-8">
        <a class="back-link text-text-secondary hover:text-text-primary text-sm" href="admin-home.html">← Dashboard</a>
        <h1>Bloquear horários</h1>
        <p class="subtitle text-text-secondary leading-relaxed mt-2 mb-5">Bloqueios manuais por barbeiro (folga, reunião, etc.).</p>

        <form id="blocked-slot-form" class="auth-form grid gap-3">
          <label for="blocked-barber">Barbeiro</label>
          <select id="blocked-barber" required></select>

          <label for="blocked-start">Início</label>
          <input id="blocked-start" type="datetime-local" required />

          <label for="blocked-end">Fim</label>
          <input id="blocked-end" type="datetime-local" required />

          <label for="blocked-reason">Motivo</label>
          <input id="blocked-reason" type="text" placeholder="Ex.: Reunião" required />

          <button class="button button-primary inline-flex items-center justify-center rounded-xl px-4 min-h-11 font-semibold transition-all duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary bg-primary text-zinc-900 hover:bg-primary-dark hover:shadow-md hover:scale-[1.01]" type="submit">Criar bloqueio</button>
        </form>

        <div id="blocked-slot-list" class="admin-schedules-list grid gap-3 mt-4"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
