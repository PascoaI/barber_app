<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Configuracoes | BarberPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#c69a45',
              'primary-dark': '#a87a2f',
              background: '#090c14',
              surface: '#111624',
              borderc: '#28314a',
              'text-primary': '#edf2ff',
              'text-secondary': '#9da8c3'
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif']
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <main class="page booking-page min-h-screen grid place-items-center p-3 md:p-8 bg-background text-text-primary font-sans py-4 md:py-8">
      <section class="booking-card settings-shell w-full max-w-5xl rounded-2xl border border-borderc bg-surface shadow-soft p-4 md:p-7 grid gap-5 relative overflow-hidden">
        <div class="settings-glow settings-glow-a" aria-hidden="true"></div>
        <div class="settings-glow settings-glow-b" aria-hidden="true"></div>

        <nav class="quick-nav quick-nav-admin flex flex-wrap justify-between gap-2" aria-label="Atalhos">
          <div class="quick-nav-left">
            <a class="button button-secondary nav-icon-btn" href="index.html" data-home><i class="bi bi-house-door"></i><span>Home</span></a>
            <button class="button button-secondary nav-icon-btn" type="button" data-back><i class="bi bi-arrow-left"></i><span>Voltar</span></button>
            <a class="button button-secondary nav-icon-btn" href="admin-home.html"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
            <a class="button button-secondary nav-icon-btn" href="admin-unit-settings.html"><i class="bi bi-sliders2"></i><span>Regras da agenda</span></a>
          </div>
          <div class="quick-nav-right">
            <button class="button button-danger nav-icon-btn" type="button" data-logout><i class="bi bi-box-arrow-right"></i><span>Sair</span></button>
          </div>
        </nav>

        <header class="settings-hero">
          <p class="settings-overline">Branding da unidade</p>
          <h1>Configuracoes administrativas</h1>
          <p class="subtitle text-text-secondary">Defina nome e logo da barbearia para exibir no painel do cliente.</p>
        </header>

        <section class="grid gap-4 lg:grid-cols-[1fr_1.35fr] items-start">
          <article class="settings-preview-card" id="brand-preview">
            <p class="settings-preview-label">Pre-visualizacao</p>
            <div class="settings-logo-wrap">
              <span id="brand-preview-placeholder" class="settings-logo-placeholder">Logo</span>
              <img id="brand-preview-logo" alt="Logo da barbearia" />
            </div>
            <strong id="brand-preview-name">BarberPro</strong>
            <p>Assim a marca vai aparecer na home do cliente.</p>
          </article>

          <article class="settings-form-card">
            <form id="admin-settings-form" class="auth-form grid gap-3">
              <label for="shop-name">Nome da barbearia</label>
              <input id="shop-name" type="text" placeholder="Ex.: Barbearia XZ" required />

              <label>Logo da barbearia</label>
              <input id="shop-logo-url" type="hidden" />
              <input id="shop-logo-file" type="file" accept="image/*" class="hidden" />

              <button id="shop-logo-trigger" class="button button-secondary settings-upload-btn" type="button">
                Selecionar arquivo da logo
              </button>
              <small id="shop-logo-file-label" class="settings-file-label">Nenhum arquivo selecionado</small>

              <button class="button button-primary inline-flex items-center justify-center rounded-xl px-4 min-h-11 font-semibold transition-all duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary bg-primary text-zinc-900 hover:bg-primary-dark hover:shadow-md hover:scale-[1.01]" type="submit">Salvar configuracoes</button>
            </form>
          </article>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
