<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperAdmin | Barbearias | BarberPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#c69a45',
              'primary-dark': '#a87a2f',
              background: '#090c14',
              surface: '#111624',
              borderc: '#28314a',
              'text-primary': '#edf2ff',
              'text-secondary': '#9da8c3'
            },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
          }
        }
      }
    </script>
  </head>
  <body>
    <main class="page booking-page min-h-screen grid place-items-center p-3 md:p-8 bg-background text-text-primary font-sans py-4 md:py-8">
      <section class="booking-card superadmin-shell w-full max-w-7xl rounded-2xl border border-borderc bg-surface shadow-soft p-4 md:p-7 grid gap-5 relative overflow-hidden">
        <div class="superadmin-glow superadmin-glow-a" aria-hidden="true"></div>
        <div class="superadmin-glow superadmin-glow-b" aria-hidden="true"></div>

        <nav class="quick-nav quick-nav-admin flex flex-wrap justify-between gap-2" aria-label="Atalhos">
          <div class="quick-nav-left">
            <a class="button button-secondary nav-icon-btn" href="index.html" data-home>
              <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 10 9-7 9 7"></path><path d="M5 10v11h14V10"></path><path d="M9 21v-6h6v6"></path></svg></span>
              <span>Home</span>
            </a>
            <button class="button button-secondary nav-icon-btn" type="button" data-back>
              <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg></span>
              <span>Voltar</span>
            </button>
          </div>
          <div class="quick-nav-right">
            <button class="button button-danger nav-icon-btn" type="button" data-logout>
              <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 21-5-5 5-5"></path><path d="M4 16h10"></path><path d="M20 3H12a2 2 0 0 0-2 2v4"></path><path d="M14 21h6a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-6"></path></svg></span>
              <span>Sair</span>
            </button>
          </div>
        </nav>

        <header class="superadmin-hero grid gap-2 md:grid-cols-[1.2fr_auto] items-center">
          <div>
            <p class="superadmin-overline">Modulo SuperAdmin</p>
            <h1>Painel central da plataforma</h1>
            <p class="subtitle text-text-secondary">Gerencie todas as barbearias da plataforma com controle centralizado.</p>
          </div>
          <article class="superadmin-counter"><small>Barbearias cadastradas</small><strong id="sa-total-barbershops">0</strong></article>
        </header>

        <section class="superadmin-table-card">
          <header class="superadmin-table-head superadmin-table-head-actions">
            <div>
              <h2>Barbearias da plataforma</h2>
              <p>Nome, contato, status e acoes administrativas.</p>
            </div>
            <a class="button button-primary superadmin-create-btn" href="super-admin-barbershop-form.html">
              <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg></span>
              <span>Adicionar barbearia</span>
            </a>
          </header>
          <div class="superadmin-table-wrap" id="tenants-root"></div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
