<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solicitações | BarberPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <main class="page booking-page min-h-screen grid place-items-center p-3 md:p-8 bg-background text-text-primary font-sans py-4 md:py-8">
      <section class="booking-card w-full max-w-6xl rounded-2xl border border-borderc bg-surface shadow-soft p-4 md:p-7 grid gap-5 relative overflow-hidden">
        <div class="admin-dashboard-glow admin-dashboard-glow-a" aria-hidden="true"></div>
        <div class="admin-dashboard-glow admin-dashboard-glow-b" aria-hidden="true"></div>

        <nav class="quick-nav quick-nav-admin flex flex-wrap justify-between gap-2 mb-1" aria-label="Atalhos">
          <div class="quick-nav-left">
            <a class="button button-secondary" href="admin-home.html">Dashboard</a>
            <button class="button button-secondary" type="button" data-back>Voltar</button>
          </div>
          <div class="quick-nav-right">
            <button class="button button-danger" type="button" data-logout>Sair</button>
          </div>
        </nav>

        <header class="grid gap-2">
          <p class="text-xs uppercase tracking-[0.22em] text-primary/90 font-semibold">Controle admin</p>
          <h1 class="text-2xl md:text-3xl font-semibold">Solicitações</h1>
          <p class="subtitle text-text-secondary">Aprove ou rejeite pedidos dos barbeiros para alterar status de atendimentos.</p>
        </header>

        <section class="barber-section-card grid gap-3">
          <div class="flex flex-wrap items-center justify-between gap-2">
            <div class="flex flex-wrap gap-2">
              <button type="button" class="button button-primary" data-request-filter="pending">Pendentes</button>
              <button type="button" class="button button-secondary" data-request-filter="approved">Aprovadas</button>
              <button type="button" class="button button-secondary" data-request-filter="rejected">Rejeitadas</button>
              <button type="button" class="button button-secondary" data-request-filter="all">Todas</button>
            </div>
            <div class="flex flex-wrap gap-2 text-xs text-text-secondary">
              <span class="barber-agenda-count">Pendentes: <strong id="admin-request-count-pending">0</strong></span>
              <span class="barber-agenda-count">Aprovadas: <strong id="admin-request-count-approved">0</strong></span>
              <span class="barber-agenda-count">Rejeitadas: <strong id="admin-request-count-rejected">0</strong></span>
            </div>
          </div>
          <div id="admin-status-requests-root" class="grid gap-3"></div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
