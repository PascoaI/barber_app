<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Estoque | BarberPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page booking-page">
      <section class="booking-card">
        <a class="back-link" href="admin-home.html">← Dashboard</a>
        <h1>Controle de estoque</h1>
        <p class="subtitle">Cadastre produtos, estoque mínimo e acompanhe consumo.</p>

        <form id="product-form" class="auth-form">
          <input id="product-id" type="hidden" />

          <label for="product-name">Produto</label>
          <input id="product-name" type="text" required />

          <label for="product-quantity">Quantidade atual</label>
          <input id="product-quantity" type="number" min="0" step="1" required />

          <label for="product-minimum">Estoque mínimo</label>
          <input id="product-minimum" type="number" min="0" step="1" required />

          <button class="button button-primary" type="submit">Salvar produto</button>
        </form>

        <div id="products-list" class="admin-schedules-list"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
