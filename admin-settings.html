<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Configurações | BarberPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page booking-page">
      <section class="booking-card">
        <a class="back-link" href="admin-home.html">← Dashboard</a>
        <h1>Configurações da barbearia</h1>
        <p class="subtitle">Defina nome, cor predominante e logo para identificar seus clientes.</p>

        <form id="admin-settings-form" class="auth-form">
          <label for="shop-name">Nome da barbearia</label>
          <input id="shop-name" type="text" placeholder="Ex.: Barbearia X" required />

          <label for="shop-color">Cor predominante</label>
          <input id="shop-color" type="color" value="#d4a24f" />

          <label for="shop-logo-url">Logo (URL de imagem)</label>
          <input id="shop-logo-url" type="url" placeholder="https://..." />

          <label for="shop-logo-file">Ou enviar arquivo da logo</label>
          <input id="shop-logo-file" type="file" accept="image/*" />

          <div class="brand-preview" id="brand-preview">
            <img id="brand-preview-logo" alt="Prévia da logo" />
            <div>
              <strong id="brand-preview-name">BarberPro</strong>
              <p>Pré-visualização da identidade da barbearia.</p>
            </div>
          </div>

          <button class="button button-primary" type="submit">Salvar configurações</button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
